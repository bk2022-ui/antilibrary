// ─── WAYPOINTS ────────────────────────────────────────────────────────────────
// Each thread's path is a sequence of [x,y] waypoints connecting stations
// Beck's rule: only H/V/45° angles. We connect station coords via intermediate points.

function stationPt(id) {
  const s = STATIONS[id];
  return [s.x, s.y];
}

// Build a polyline path from a list of station ids, inserting routing waypoints as needed
function buildPath(stationIds, routeOverrides) {
  // routeOverrides: map from "id1->id2" to array of intermediate [x,y] points
  const pts = [];
  for (let i = 0; i < stationIds.length; i++) {
    const id = stationIds[i];
    if (!STATIONS[id]) { console.warn('Missing station:', id); continue; }
    if (i > 0) {
      const prevId = stationIds[i-1];
      const key = prevId + '->' + id;
      if (routeOverrides && routeOverrides[key]) {
        for (const wp of routeOverrides[key]) pts.push(wp);
      }
    }
    pts.push(stationPt(id));
  }
  return pts;
}

function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);

}

function ptsToD(pts) {
  return pts.map((p,i) => (i===0?'M':'L') + p[0]+','+p[1]).join(' ');

// Draw each thread as a series of polylines between consecutive stations
// We use actual ordered station coordinates for a clean layout
function drawThreadLine(thread) {
  const ids = thread.stations;
  const pts = ids.map(id => {
    const s = STATIONS[id];
    if (!s) return null;
    return [s.x, s.y];
  }).filter(Boolean);

  if (pts.length < 2) return;

  // Snap to Beck's rule: only H/V/45°
  // We connect points with intermediate waypoints
  for (let i = 0; i < pts.length - 1; i++) {
    const [x1,y1] = pts[i];
    const [x2,y2] = pts[i+1];
    const segments = beckPath(x1,y1,x2,y2);
    const path = el('path', {
      d: segments,
      stroke: thread.color,
      'stroke-width': 5,
      fill: 'none',
      'stroke-linecap': 'round',
      'stroke-linejoin': 'round',
      'data-thread': thread.id,
      class: 'thread-line'
    });
    lineGroup.appendChild(path);
  }
}

// Beck path: connect two points with H/V/45° only
// Strategy: prefer 45° diagonal then straight
function beckPath(x1,y1,x2,y2) {
  const dx = x2-x1, dy = y2-y1;
  if (dx === 0 || dy === 0) {
    return `M ${x1},${y1} L ${x2},${y2}`;
  }
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx === ady) {
    return `M ${x1},${y1} L ${x2},${y2}`;
  }
  // If more horizontal: go 45° then horizontal
  if (adx > ady) {
    const sx = dx > 0 ? 1 : -1;
    const sy = dy > 0 ? 1 : -1;
    const mx = x1 + sx * ady;
    return `M ${x1},${y1} L ${mx},${y2} L ${x2},${y2}`;
  } else {
    // More vertical: go 45° then vertical
    const sx = dx > 0 ? 1 : -1;
    const sy = dy > 0 ? 1 : -1;
    const my = y1 + sy * adx;
    return `M ${x1},${y1} L ${x2},${my} L ${x2},${y2}`;
  }
}

for (const thread of Object.values(THREADS)) {

function getInterchangeRadius(numThreads) {
  if (numThreads >= 3) return 14;
  if (numThreads === 2) return 10;
  return 6;
}

function drawInterchangeArcs(cx, cy, r, colors) {
  const n = colors.length;
  const paths = [];
  for (let i = 0; i < n; i++) {
    const startAngle = (i / n) * 2 * Math.PI - Math.PI/2;
    const endAngle = ((i+1) / n) * 2 * Math.PI - Math.PI/2;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
    paths.push(`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${colors[i]}"/>`);
  }
  return paths.join('');
}

// Label placement: alternate above/below, offset by 45°
// Returns [dx, dy, anchor]
function getLabelOffset(station, idx) {
  const n = station.threads.length;
  // Prefer placing labels away from the map center (1000,600)
  const cx = station.x < 1000 ? 1 : -1; // left side: push right; right side: push left
  const cy = station.y < 600 ? 1 : -1;  // top half: push down; bottom: push up

  // Simple alternating above/below
  if (station.y < 300) return [8, 14, 'start'];  // near top: label below
  if (station.y > 900) return [8, -10, 'start']; // near bottom: label above
  if (station.x < 200) return [10, -8, 'start']; // left edge: label right
  if (station.x > 1700) return [-10, -8, 'end']; // right edge: label left

  // Default: alternate
  if (idx % 2 === 0) return [8, -8, 'start'];
  return [8, 14, 'start'];
}

let stationIdx = 0;
for (const [id, station] of Object.entries(STATIONS)) {
  const numThreads = station.threads.length;
  const r = getInterchangeRadius(numThreads);
  const g = el('g', {
    'data-station': id,
    class: 'station-group',
    style: 'cursor:pointer'
  });

  // Interchange station
  if (numThreads >= 2) {
    const colors = station.threads.map(tid => THREADS[tid]?.color || '#888');

    // White background circle
    g.appendChild(el('circle', { cx: station.x, cy: station.y, r: r+2, fill:'#F5F0E8' }));

    // Draw arc segments using innerHTML trick via foreignObject...
    // Actually use a temp group approach
    const arcG = el('g', { class:'interchange-arcs' });
    const n = colors.length;
    for (let i = 0; i < n; i++) {
      const startAngle = (i / n) * 2 * Math.PI - Math.PI/2;
      const endAngle = ((i+1) / n) * 2 * Math.PI - Math.PI/2;
      const x1 = station.x + r * Math.cos(startAngle);
      const y1 = station.y + r * Math.sin(startAngle);
      const x2 = station.x + r * Math.cos(endAngle);
      const y2 = station.y + r * Math.sin(endAngle);
      const largeArc = ((endAngle - startAngle) > Math.PI) ? 1 : 0;
      const p = el('path', {
        d: `M ${station.x} ${station.y} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`,
        fill: colors[i]
      });
      arcG.appendChild(p);
    }
    g.appendChild(arcG);

    // White center dot
    g.appendChild(el('circle', { cx: station.x, cy: station.y, r: 3, fill:'#F5F0E8', stroke:'#888', 'stroke-width':0.5 }));

  } else {
    // Single thread station
    const color = THREADS[station.threads[0]]?.color || '#888';
    g.appendChild(el('circle', {
      cx: station.x, cy: station.y, r: 6,
      fill: color, stroke: '#080604', 'stroke-width': 1.5
    }));
    g.appendChild(el('circle', {
      cx: station.x, cy: station.y, r: 2,
      fill: '#F5F0E8'
    }));
  }

  // Invisible hit area
  g.appendChild(el('circle', {
    cx: station.x, cy: station.y, r: Math.max(r, 8) + 4,
    fill: 'transparent', class:'station-hit'
  }));

  stationGroup.appendChild(g);

  // Label
  const [dx, dy, anchor] = getLabelOffset(station, stationIdx);
  const label = el('text', {
    x: station.x + dx,
    y: station.y + dy,
    'font-size': 10,
    'font-family': 'system-ui, -apple-system, sans-serif',
    fill: '#C8C0B0',
    'text-anchor': anchor,
    'data-station-label': id,
    'pointer-events': 'none'
  });
  label.textContent = station.title;
  labelGroup.appendChild(label);

  stationIdx++;
}

  document.querySelectorAll('[data-station-label]').forEach(l => {
    const sid = l.dataset.stationLabel;

  document.querySelectorAll('.terminus-label').forEach(l => {
    l.style.opacity = l.dataset.threadLabel === tid ? 1 : 0.1;

}

function highlightStation(sid) {
  const s = STATIONS[sid];
  if (!s) return;
  const tids = new Set(s.threads);
  document.querySelectorAll('.thread-line').forEach(l => {
    l.style.opacity = tids.has(l.dataset.thread) ? 1 : 0.1;
    l.style.strokeWidth = tids.has(l.dataset.thread) ? 7 : 5;
  });
  document.querySelectorAll('.station-group').forEach(g => {
    const st = STATIONS[g.dataset.station];
    const shared = st && st.threads.some(t => tids.has(t));
    g.style.opacity = shared ? 1 : 0.15;
  });
  document.querySelectorAll('[data-station-label]').forEach(l => {
    const st = STATIONS[l.dataset.stationLabel];
    const shared = st && st.threads.some(t => tids.has(t));
    l.style.opacity = shared ? 1 : 0.1;
  });
}

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
const container = document.getElementById('map-container');
const inner = document.getElementById('map-inner');

let transform = { x: 0, y: 0, scale: 0.7 };
// Start zoomed out to see the whole map
transform.x = (window.innerWidth - 2000 * transform.scale) / 2;
transform.y = (window.innerHeight - 1200 * transform.scale) / 2;

function applyTransform() {
  inner.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
}
applyTransform();

let dragging = false;
let dragStart = { x: 0, y: 0 };
let transformStart = { x: 0, y: 0 };

container.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  transformStart = { x: transform.x, y: transform.y };
  container.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = transformStart.x + (e.clientX - dragStart.x);
  transform.y = transformStart.y + (e.clientY - dragStart.y);
  applyTransform();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  container.classList.remove('dragging');
});

container.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(3, Math.max(0.3, transform.scale * factor));
  // Zoom towards mouse position
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx - (mx - transform.x) * (newScale / transform.scale);
  transform.y = my - (my - transform.y) * (newScale / transform.scale);
  transform.scale = newScale;
  applyTransform();
}, { passive: false });

document.getElementById('zoom-in').addEventListener('click', () => {
  const newScale = Math.min(3, transform.scale * 1.2);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  transform.x = cx - (cx - transform.x) * (newScale / transform.scale);
  transform.y = cy - (cy - transform.y) * (newScale / transform.scale);
  transform.scale = newScale;
  applyTransform();
});

document.getElementById('zoom-out').addEventListener('click', () => {
  const newScale = Math.max(0.3, transform.scale / 1.2);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  transform.x = cx - (cx - transform.x) * (newScale / transform.scale);
  transform.y = cy - (cy - transform.y) * (newScale / transform.scale);
  transform.scale = newScale;
  applyTransform();
});

document.getElementById('zoom-reset').addEventListener('click', () => {
  transform.scale = 0.7;
  transform.x = (window.innerWidth - 2000 * transform.scale) / 2;
  transform.y = (window.innerHeight - 1200 * transform.scale) / 2;
  applyTransform();
});

// Touch support
let lastTouchDist = 0;
let lastTouchCenter = { x:0, y:0 };

container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    transformStart = { x: transform.x, y: transform.y };
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX)/2,
      y: (e.touches[0].clientY + e.touches[1].clientY)/2
    };
  }
  e.preventDefault();
}, { passive:false });

container.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    transform.x = transformStart.x + (e.touches[0].clientX - dragStart.x);
    transform.y = transformStart.y + (e.touches[0].clientY - dragStart.y);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const factor = dist / lastTouchDist;
    const newScale = Math.min(3, Math.max(0.3, transform.scale * factor));
    const cx = lastTouchCenter.x;
    const cy = lastTouchCenter.y;
    transform.x = cx - (cx - transform.x) * (newScale / transform.scale);
    transform.y = cy - (cy - transform.y) * (newScale / transform.scale);
    transform.scale = newScale;
    lastTouchDist = dist;
    applyTransform();
  }
  e.preventDefault();
}, { passive:false });

container.addEventListener('touchend', () => { dragging = false; });

</script>
